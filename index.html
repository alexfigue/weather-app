<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- SEO -->
  <title>El Tiempo · L'Ametlla de Mar</title>
  <meta name="description"
    content="Predicción meteorológica completa para L'Ametlla de Mar. Temperatura, humedad, viento, índice UV, calidad del aire y predicción de hasta 16 días.">
  <meta name="keywords" content="tiempo, meteorología, L'Ametlla de Mar, predicción, calidad del aire, temperatura">
  <meta name="author" content="El Tiempo App">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f0c29">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="El Tiempo">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌤️</text></svg>">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando datos meteorológicos...</div>
  </div>

  <!-- Main App -->
  <main class="app" id="app" role="main">
    <!-- Content is rendered by JavaScript -->
  </main>

  <!-- PWA Install Banner -->
  <div class="install-banner" id="install-banner">
    <span class="install-banner__text">📲 Instalar como app</span>
    <button class="install-banner__btn" onclick="installApp()">Instalar</button>
    <button class="install-banner__close" onclick="dismissInstall()" aria-label="Cerrar">&times;</button>
  </div>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- App Logic -->
  <script src="./app.js"></script>
</body>

</html>
